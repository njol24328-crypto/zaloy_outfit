services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: zaloy
      MYSQL_USER: zaloy
      MYSQL_PASSWORD: zaloypass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  phpmyadmin:
    image: phpmyadmin:latest
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: zaloy
      PMA_PASSWORD: zaloypass
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  db_data:
